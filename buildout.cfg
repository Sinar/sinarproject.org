[buildout]
extensions = 
    buildout.sanitycheck
    mr.developer
parts = 
    instance
    scripts

extends =
    https://dist.plone.org/release/6.0.15/versions.cfg

find-links = https://download.plone.org/release/6.0.15/py3.12/

effective-user = 
show-picked-versions = true
versions = versions

http-address = 8080

policies = 

sources-dir = src/
auto-checkout = *
always-checkout = true

[sources]
sinar.activity = git git@github.com:/Sinar/sinar.activity/ branch=main
sinar.article = git git@github.com:/Sinar/sinar.article/ branch=main
sinarproject.customizations = git git@github.com:Sinar/sinarproject.customizations.git branch=main
sinar.opportunities = git git@github.com:/Sinar/sinar.opportunities branch=main
sinar.organization = git git@github.com:/Sinar/sinar.organization branch=main
sinar.project = git git@github.com:/Sinar/sinar.project/ branch=main
sinar.resource = git git@github.com:/Sinar/sinar.resource/ branch=main
sinar.indicators = git git@github.com:/Sinar/sinar.indicators/ branch=main
sinar.miscbehavior = git git@github.com:/Sinar/sinar.miscbehavior/ branch=main
collective.vocabularies.iso = git git@github.com:/Sinar/collective.vocabularies.iso.git

[mr.developer]
threads = 1

[instance]
recipe = plone.recipe.zope2instance
eggs = 
    Plone
    Pillow
    sinar.activity
    sinar.article
    sinarproject.customizations
    sinar.indicators
    sinar.opportunities
    sinar.organization
    sinar.project
    sinar.miscbehavior
    sinar.resource
    collective.vocabularies.iso
    collective.js.jqueryui
    eea.facetednavigation
    ${buildout:policies}

http-address = ${buildout:http-address}
user = admin:admin 
effective-user = ${buildout:effective-user}
zodb-cache-size = 3000

[scripts]
recipe = zc.recipe.egg
interpreter = zopepy
eggs = ${instance:eggs}

[versions]
z3c.jbot=2.1
